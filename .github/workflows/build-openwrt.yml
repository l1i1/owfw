name: Build OpenWrt for JDCloud AX1800 Pro

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: "false"
      force_base_rebuild:
        description: "Force rebuild base firmware instead of reusing the latest matching base artifact"
        required: false
        default: "false"
      mgrserver_repo:
        description: "MgrServer repo (owner/repo)"
        required: false
        default: "l1i1/MgrServer"
      mgrserver_branch:
        description: "MgrServer branch"
        required: false
        default: "main"

env:
  REPO_URL: https://github.com/l1i1/immortalwrt
  REPO_BRANCH: master
  REPO_DISPLAY_NAME: l1i1/immortalwrt
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: configs/jdc-ax1800pro.config
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  BASE_BUILD_FINGERPRINT_VERSION: 2026-04-21-v1
  TZ: Asia/Shanghai

permissions:
  actions: read
  contents: write

jobs:
  resolve_base_build:
    name: Resolve Base Build Reuse
    runs-on: ubuntu-22.04
    outputs:
      base_build_fingerprint: ${{ steps.base_fingerprint.outputs.base_build_fingerprint }}
      reuse_base: ${{ steps.base_reuse.outputs.reuse_base }}
      handoff_artifact_name: ${{ steps.base_reuse.outputs.handoff_artifact_name }}
      handoff_artifact_id: ${{ steps.base_reuse.outputs.handoff_artifact_id }}
      openwrt_commit: ${{ steps.base_reuse.outputs.openwrt_commit }}
      feed_revision_hash: ${{ steps.base_reuse.outputs.feed_revision_hash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute base build fingerprint
        id: base_fingerprint
        shell: bash
        run: |
          set -euo pipefail

          hash_file_list() {
            if [ "$#" -eq 0 ]; then
              printf 'none'
              return 0
            fi

            local tmp
            local path

            tmp="$(mktemp)"
            : > "$tmp"

            for path in "$@"; do
              printf '%s\0' "$path" >> "$tmp"
              cat "$path" >> "$tmp"
              printf '\0' >> "$tmp"
            done

            sha256sum "$tmp" | awk '{print $1}'
            rm -f "$tmp"
          }

          mapfile -t package_files < <(git ls-files -- 'package/**')
          mapfile -t base_overlay_files < <(
            git ls-files -- \
              'files/**' \
              ':(exclude)files/root/mgrserver/**' \
              ':(exclude)files/usr/share/mgrserver-defaults/pxe/**'
          )

          base_input_hash="$({
            hash_file_list \
              configs/jdc-ax1800pro.config \
              feeds.conf.default \
              scripts/diy-part1.sh \
              scripts/diy-part2.sh \
              scripts/extract-prebuilt-ipks.sh \
              scripts/clear-mgrserver-runtime-overlay.sh \
              "${package_files[@]}" \
              "${base_overlay_files[@]}"
          })"

          upstream_source_hash="$({
            printf '%s\n%s\n%s\n' "$REPO_URL" "$REPO_BRANCH" "$REPO_DISPLAY_NAME" \
              | sha256sum \
              | awk '{print $1}'
          })"

          base_build_fingerprint="$({
            printf '%s\n%s\n%s\n' "$BASE_BUILD_FINGERPRINT_VERSION" "$upstream_source_hash" "$base_input_hash" \
              | sha256sum \
              | awk '{print $1}'
          })"

          {
            echo "base_build_fingerprint=$base_build_fingerprint"
            echo "base_input_hash=$base_input_hash"
            echo "upstream_source_hash=$upstream_source_hash"
            echo "tracked_package_file_count=${#package_files[@]}"
            echo "tracked_base_overlay_file_count=${#base_overlay_files[@]}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve reusable base artifact
        id: base_reuse
        uses: actions/github-script@v7
        env:
          BASE_BUILD_FINGERPRINT: ${{ steps.base_fingerprint.outputs.base_build_fingerprint }}
          FORCE_BASE_REBUILD: ${{ github.event.inputs.force_base_rebuild || github.event.client_payload.force_base_rebuild || 'false' }}
        with:
          script: |
            const fingerprint = process.env.BASE_BUILD_FINGERPRINT;
            const force = String(process.env.FORCE_BASE_REBUILD || "false").toLowerCase() === "true";
            const prefix = `openwrt-base-build-handoff-${fingerprint}-`;
            const currentBranch = context.ref.startsWith("refs/heads/") ? context.ref.slice("refs/heads/".length) : "";

            core.setOutput("reuse_base", "false");
            core.setOutput("handoff_artifact_name", "");
            core.setOutput("handoff_artifact_id", "");
            core.setOutput("openwrt_commit", "");
            core.setOutput("feed_revision_hash", "");

            if (force) {
              core.notice(`force_base_rebuild=true, skipping base artifact reuse for fingerprint ${fingerprint}`);
              return;
            }

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const matches = artifacts
              .filter((artifact) => {
                if (artifact.expired || !artifact.name.startsWith(prefix)) {
                  return false;
                }

                if (!currentBranch || !artifact.workflow_run?.head_branch) {
                  return true;
                }

                return artifact.workflow_run.head_branch === currentBranch;
              })
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const pattern = new RegExp(`^openwrt-base-build-handoff-${fingerprint}-([0-9a-f]{40})-([0-9a-f]{64})$`);

            for (const artifact of matches) {
              const parsed = artifact.name.match(pattern);
              if (!parsed) {
                core.warning(`Skipping malformed base handoff artifact name: ${artifact.name}`);
                continue;
              }

              core.notice(`Reusing base artifact ${artifact.name} from workflow run ${artifact.workflow_run?.id ?? "unknown"}`);
              core.setOutput("reuse_base", "true");
              core.setOutput("handoff_artifact_name", artifact.name);
              core.setOutput("handoff_artifact_id", String(artifact.id));
              core.setOutput("openwrt_commit", parsed[1]);
              core.setOutput("feed_revision_hash", parsed[2]);
              return;
            }

            core.notice(`No reusable base artifact found for fingerprint ${fingerprint} on branch ${currentBranch || "unknown"}`);

      - name: Show base reuse plan
        run: |
          echo "Base build fingerprint version: $BASE_BUILD_FINGERPRINT_VERSION"
          echo "Base build fingerprint: ${{ steps.base_fingerprint.outputs.base_build_fingerprint }}"
          echo "Upstream source hash: ${{ steps.base_fingerprint.outputs.upstream_source_hash }}"
          echo "OpenWrt source selector: $REPO_URL @ $REPO_BRANCH"
          echo "Base input hash: ${{ steps.base_fingerprint.outputs.base_input_hash }}"
          echo "Tracked package files: ${{ steps.base_fingerprint.outputs.tracked_package_file_count }}"
          echo "Tracked base overlay files: ${{ steps.base_fingerprint.outputs.tracked_base_overlay_file_count }}"
          echo "Reuse base artifact: ${{ steps.base_reuse.outputs.reuse_base }}"
          echo "Resolved handoff artifact: ${{ steps.base_reuse.outputs.handoff_artifact_name }}"
          echo "Resolved OpenWrt commit: ${{ steps.base_reuse.outputs.openwrt_commit }}"
          echo "Resolved feed revision hash: ${{ steps.base_reuse.outputs.feed_revision_hash }}"

  build_base:
    name: Build Base Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 600
    needs:
      - resolve_base_build
    if: needs.resolve_base_build.outputs.reuse_base != 'true'
    outputs:
      base_build_fingerprint: ${{ needs.resolve_base_build.outputs.base_build_fingerprint }}
      handoff_artifact_name: ${{ steps.base_artifact_names.outputs.handoff_artifact_name }}
      openwrt_commit: ${{ steps.openwrt_ref.outputs.commit }}
      feed_revision_hash: ${{ steps.resolved_feeds.outputs.feed_revision_hash }}

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU核心: $(nproc)"
          echo "内存: $(free -h | grep Mem | awk '{print $2}')"
          df -hT

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Disk Space After Cleanup
        run: df -hT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute cache fingerprints
        id: cache_fingerprint
        shell: bash
        run: |
          set -euo pipefail

          hash_file_list() {
            if [ "$#" -eq 0 ]; then
              printf 'none'
              return 0
            fi

            local tmp
            local path

            tmp="$(mktemp)"
            : > "$tmp"

            for path in "$@"; do
              printf '%s\0' "$path" >> "$tmp"
              cat "$path" >> "$tmp"
              printf '\0' >> "$tmp"
            done

            sha256sum "$tmp" | awk '{print $1}'
            rm -f "$tmp"
          }

          mapfile -t package_files < <(git ls-files 'package/**')

          package_tree_hash="$(hash_file_list "${package_files[@]}")"
          package_selection_hash="$({
            grep -E '^(CONFIG_PACKAGE_|CONFIG_NODEJS_|CONFIG_ARIA2_|CONFIG_TARGET_ROOTFS_|CONFIG_TARGET_IMAGES_|CONFIG_SIGNED_PACKAGES|CONFIG_ALL_|CONFIG_IB|CONFIG_SDK|CONFIG_DEVEL)' \
              configs/jdc-ax1800pro.config \
              | sort \
              | sha256sum \
              | awk '{print $1}'
          })"
          toolchain_config_hash="$({
            grep -E '^(CONFIG_TARGET|CONFIG_TARGET_|CONFIG_TARGET_.*DEVICE_|CONFIG_ARCH|CONFIG_CPU_TYPE|CONFIG_CPU_SUBTYPE|CONFIG_USE_MUSL|CONFIG_USE_GLIBC|CONFIG_USE_UCLIBC|CONFIG_LIBC_|CONFIG_EXTERNAL_TOOLCHAIN|CONFIG_GCC_|CONFIG_BINUTILS_)' \
              configs/jdc-ax1800pro.config \
              | sort \
              | sha256sum \
              | awk '{print $1}'
          })"

          feeds_hash="$(hash_file_list feeds.conf.default scripts/diy-part1.sh)"
          dl_hash="$(hash_file_list feeds.conf.default scripts/diy-part1.sh scripts/diy-part2.sh "${package_files[@]}")"
          ccache_scope_hash="$({
            printf '%s\n' "${toolchain_config_hash}" "${package_selection_hash}" \
              | sha256sum \
              | awk '{print $1}'
          })"
          toolchain_hash="$(hash_file_list feeds.conf.default scripts/diy-part1.sh)"

          {
            echo "package_tree_hash=$package_tree_hash"
            echo "package_selection_hash=$package_selection_hash"
            echo "toolchain_config_hash=$toolchain_config_hash"
            echo "feeds_hash=$feeds_hash"
            echo "dl_hash=$dl_hash"
            echo "ccache_scope_hash=$ccache_scope_hash"
            echo "toolchain_hash=$toolchain_hash"
          } >> "$GITHUB_OUTPUT"

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-openwrt-ccache-v2-${{ steps.cache_fingerprint.outputs.ccache_scope_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-v2-

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs u-boot-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo pip3 install --upgrade pip
          sudo pip3 install --upgrade setuptools wheel build pyproject-hooks
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

          echo "Configuring ccache..."
          ccache --max-size=15G
          ccache -z
          echo "CCACHE_DIR=\$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=/workdir/openwrt" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=1" >> $GITHUB_ENV

      - name: Clone source code
        id: openwrt_ref
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          echo "commit=$(git -C openwrt rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Show cache plan
        run: |
          echo "Build role: base"
          echo "Base build fingerprint: ${{ needs.resolve_base_build.outputs.base_build_fingerprint }}"
          echo "Cache fingerprints:"
          echo "  package_selection_hash=${{ steps.cache_fingerprint.outputs.package_selection_hash }}"
          echo "  package_tree_hash=${{ steps.cache_fingerprint.outputs.package_tree_hash }}"
          echo "  toolchain_config_hash=${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}"
          echo "  feeds_hash=${{ steps.cache_fingerprint.outputs.feeds_hash }}"
          echo "  dl_hash=${{ steps.cache_fingerprint.outputs.dl_hash }}"
          echo "  ccache_scope_hash=${{ steps.cache_fingerprint.outputs.ccache_scope_hash }}"
          echo "  toolchain_hash=${{ steps.cache_fingerprint.outputs.toolchain_hash }}"
          echo "OpenWrt source commit: ${{ steps.openwrt_ref.outputs.commit }}"
          echo "Cache keys:"
          echo "  ccache=${{ runner.os }}-openwrt-ccache-v2-${{ steps.cache_fingerprint.outputs.ccache_scope_hash }}"
          echo "  feeds=${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.feeds_hash }}"
          echo "  dl=${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.dl_hash }}"
          echo "  toolchain=${{ runner.os }}-openwrt-toolchain-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.toolchain_hash }}"

      - name: Restore feeds cache
        id: feeds_cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/feeds
          key: ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.feeds_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-feeds-

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        if: steps.feeds_cache.outputs.cache-hit != 'true'
        run: cd openwrt && ./scripts/feeds update -a

      - name: Compute resolved feed fingerprint
        id: resolved_feeds
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt

          tmp="$(mktemp)"
          while IFS= read -r feed; do
            if git -C "feeds/$feed" rev-parse HEAD >/dev/null 2>&1; then
              printf '%s %s\n' "$feed" "$(git -C "feeds/$feed" rev-parse HEAD)" >> "$tmp"
            fi
          done < <(find feeds -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          if [ ! -s "$tmp" ]; then
            echo "No feed revisions found after update." >&2
            rm -f "$tmp"
            exit 1
          fi

          feed_revision_hash="$(sha256sum "$tmp" | awk '{print $1}')"

          {
            echo "feed_revision_hash=$feed_revision_hash"
            echo "feed_revisions<<EOF"
            cat "$tmp"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          rm -f "$tmp"

      - name: Show target/package cache plan
        run: |
          echo "Resolved feed revisions:"
          printf '%s\n' "${{ steps.resolved_feeds.outputs.feed_revisions }}"
          echo "Resolved fingerprints:"
          echo "  feed_revision_hash=${{ steps.resolved_feeds.outputs.feed_revision_hash }}"
          echo "Target/package cache key:"
          echo "  target_package=${{ runner.os }}-openwrt-target-package-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.cache_fingerprint.outputs.package_tree_hash }}-${{ steps.resolved_feeds.outputs.feed_revision_hash }}"

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Clear MgrServer runtime overlay for base build
        run: bash "$GITHUB_WORKSPACE/scripts/clear-mgrserver-runtime-overlay.sh"

      - name: Extract prebuilt IPKs into files overlay
        run: bash "$GITHUB_WORKSPACE/scripts/extract-prebuilt-ipks.sh"

      - name: Load custom configuration
        run: |
          [ -e files ] && cp -r files openwrt/files
          if [ -d package ]; then
            mkdir -p openwrt/package
            cp -r package/. openwrt/package/
          fi
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Prepare build configuration
        run: |
          cd openwrt
          make defconfig

      - name: Restore source download cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.dl_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.openwrt_ref.outputs.commit }}-
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-dl-

      - name: Restore toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/host
            openwrt/staging_dir/hostpkg
            openwrt/staging_dir/toolchain-*
            openwrt/build_dir/host
            openwrt/build_dir/hostpkg
            openwrt/build_dir/toolchain-*
          key: ${{ runner.os }}-openwrt-toolchain-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.toolchain_hash }}

      - name: Restore target/package cache
        id: target_package_cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/openwrt-target-package
          key: ${{ runner.os }}-openwrt-target-package-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.cache_fingerprint.outputs.package_tree_hash }}-${{ steps.resolved_feeds.outputs.feed_revision_hash }}

      - name: Download package
        id: package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Warm tools and toolchain cache
        run: |
          cd openwrt
          echo "Reusing host tools and toolchain cache..."
          make tools/install -j"$(nproc)" || make tools/install -j1 V=s
          make toolchain/install -j"$(nproc)" || make toolchain/install -j1 V=s

      - name: Hydrate target/package cache
        shell: bash
        run: |
          set -euo pipefail

          CACHE_ROOT="$GITHUB_WORKSPACE/.cache/openwrt-target-package"
          OPENWRT_ROOT="$GITHUB_WORKSPACE/openwrt"

          if [ ! -d "$CACHE_ROOT" ]; then
            echo "No target/package cache restored."
            exit 0
          fi

          echo "Hydrating curated target/package cache into build tree..."

          if [ -d "$CACHE_ROOT/bin/packages" ]; then
            mkdir -p "$OPENWRT_ROOT/bin/packages"
            rsync -a "$CACHE_ROOT/bin/packages/" "$OPENWRT_ROOT/bin/packages/"
          fi

          if [ -d "$CACHE_ROOT/staging_dir" ]; then
            mkdir -p "$OPENWRT_ROOT/staging_dir"
            rsync -a "$CACHE_ROOT/staging_dir/" "$OPENWRT_ROOT/staging_dir/"
          fi

          if [ -d "$CACHE_ROOT/build_dir" ]; then
            mkdir -p "$OPENWRT_ROOT/build_dir"
            rsync -a "$CACHE_ROOT/build_dir/" "$OPENWRT_ROOT/build_dir/"
          fi

          echo "Hydrated target/package cache contents:"
          du -sh "$CACHE_ROOT" || true

      - name: Compile base firmware (without MgrServer runtime overlay)
        id: compile
        run: |
          cd openwrt
          echo "ccache stats before base compile:"
          ccache -s || true
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "ccache stats after base compile:"
          ccache -s || true
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Stage base build handoff payload
        id: stage_handoff
        if: steps.compile.outputs.status == 'success' && !cancelled()
        shell: bash
        env:
          HANDOFF_ROOT: ${{ github.workspace }}/.artifact-handoff/base-build
          BASE_BUILD_FINGERPRINT: ${{ needs.resolve_base_build.outputs.base_build_fingerprint }}
          OPENWRT_COMMIT: ${{ steps.openwrt_ref.outputs.commit }}
          FEED_REVISION_HASH: ${{ steps.resolved_feeds.outputs.feed_revision_hash }}
        run: |
          set -euo pipefail

          HANDOFF_DL="$HANDOFF_ROOT/dl"
          HANDOFF_TARGET="$HANDOFF_ROOT/target-package"
          OPENWRT_ROOT="$GITHUB_WORKSPACE/openwrt"
          CACHE_ROOT="$GITHUB_WORKSPACE/.cache/openwrt-target-package"

          rm -rf "$HANDOFF_ROOT"
          mkdir -p "$HANDOFF_DL" "$HANDOFF_TARGET"

          if [ -d "$OPENWRT_ROOT/dl" ]; then
            rsync -a "$OPENWRT_ROOT/dl/" "$HANDOFF_DL/"
          fi

          if [ -d "$OPENWRT_ROOT/bin/packages" ]; then
            mkdir -p "$HANDOFF_TARGET/bin/packages"
            rsync -a "$OPENWRT_ROOT/bin/packages/" "$HANDOFF_TARGET/bin/packages/"
          fi

          if [ -d "$OPENWRT_ROOT/staging_dir" ]; then
            mkdir -p "$HANDOFF_TARGET/staging_dir"
            rsync -a \
              --prune-empty-dirs \
              --include='*/' \
              --include='target-*' \
              --include='target-*/**' \
              --exclude='*' \
              "$OPENWRT_ROOT/staging_dir/" "$HANDOFF_TARGET/staging_dir/"
          fi

          if [ -d "$OPENWRT_ROOT/build_dir" ]; then
            mkdir -p "$HANDOFF_TARGET/build_dir"
            rsync -a \
              --prune-empty-dirs \
              --include='*/' \
              --include='target-*' \
              --include='target-*/**' \
              --exclude='*' \
              "$OPENWRT_ROOT/build_dir/" "$HANDOFF_TARGET/build_dir/"
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          handoff_root = Path(os.environ["HANDOFF_ROOT"])
          metadata = {
              "base_build_fingerprint": os.environ["BASE_BUILD_FINGERPRINT"],
              "openwrt_commit": os.environ["OPENWRT_COMMIT"],
              "feed_revision_hash": os.environ["FEED_REVISION_HASH"],
          }
          (handoff_root / "metadata.json").write_text(json.dumps(metadata, indent=2), encoding="utf-8")
          PY

          tar -C "$GITHUB_WORKSPACE/.artifact-handoff" -cf "$GITHUB_WORKSPACE/.artifact-handoff/openwrt-base-build-handoff.tar" base-build

          echo "Base build handoff payload prepared:"
          du -sh "$HANDOFF_ROOT" || true
          du -sh "$GITHUB_WORKSPACE/.artifact-handoff/openwrt-base-build-handoff.tar" || true

      - name: Compute base artifact names
        id: base_artifact_names
        if: steps.stage_handoff.outcome == 'success' && !cancelled()
        env:
          BASE_BUILD_FINGERPRINT: ${{ needs.resolve_base_build.outputs.base_build_fingerprint }}
          OPENWRT_COMMIT: ${{ steps.openwrt_ref.outputs.commit }}
          FEED_REVISION_HASH: ${{ steps.resolved_feeds.outputs.feed_revision_hash }}
        run: |
          name="openwrt-base-build-handoff-${BASE_BUILD_FINGERPRINT}-${OPENWRT_COMMIT}-${FEED_REVISION_HASH}"
          echo "handoff_artifact_name=$name" >> "$GITHUB_OUTPUT"
          echo "Base handoff artifact name: $name"

      - name: Upload base build handoff artifact
        uses: actions/upload-artifact@v4
        if: steps.stage_handoff.outcome == 'success' && !cancelled()
        with:
          name: ${{ steps.base_artifact_names.outputs.handoff_artifact_name }}
          path: ${{ github.workspace }}/.artifact-handoff/openwrt-base-build-handoff.tar
          retention-days: 7
          if-no-files-found: error

      - name: Stage target/package cache snapshot
        id: stage_target_package_cache
        if: steps.compile.outputs.status == 'success' && !cancelled()
        shell: bash
        run: |
          set -euo pipefail

          CACHE_ROOT="$GITHUB_WORKSPACE/.cache/openwrt-target-package"
          OPENWRT_ROOT="$GITHUB_WORKSPACE/openwrt"

          rm -rf "$CACHE_ROOT"
          mkdir -p "$CACHE_ROOT"

          if [ -d "$OPENWRT_ROOT/bin/packages" ]; then
            mkdir -p "$CACHE_ROOT/bin/packages"
            rsync -a "$OPENWRT_ROOT/bin/packages/" "$CACHE_ROOT/bin/packages/"
          fi

          if [ -d "$OPENWRT_ROOT/staging_dir" ]; then
            mkdir -p "$CACHE_ROOT/staging_dir"
            rsync -a \
              --prune-empty-dirs \
              --include='*/' \
              --include='target-*' \
              --include='target-*/**' \
              --exclude='*' \
              "$OPENWRT_ROOT/staging_dir/" "$CACHE_ROOT/staging_dir/"
          fi

          if [ -d "$OPENWRT_ROOT/build_dir" ]; then
            mkdir -p "$CACHE_ROOT/build_dir"
            rsync -a \
              --prune-empty-dirs \
              --include='*/' \
              --include='target-*' \
              --include='target-*/**' \
              --exclude='*' \
              "$OPENWRT_ROOT/build_dir/" "$CACHE_ROOT/build_dir/"
          fi

          echo "Staged curated target/package cache contents:"
          du -sh "$CACHE_ROOT" || true

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

  build_overlay:
    name: Build MgrServer Overlay Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 600
    needs:
      - resolve_base_build
      - build_base

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU核心: $(nproc)"
          echo "内存: $(free -h | grep Mem | awk '{print $2}')"
          df -hT

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Disk Space After Cleanup
        run: df -hT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute cache fingerprints
        id: cache_fingerprint
        shell: bash
        run: |
          set -euo pipefail

          hash_file_list() {
            if [ "$#" -eq 0 ]; then
              printf 'none'
              return 0
            fi

            local tmp
            local path

            tmp="$(mktemp)"
            : > "$tmp"

            for path in "$@"; do
              printf '%s\0' "$path" >> "$tmp"
              cat "$path" >> "$tmp"
              printf '\0' >> "$tmp"
            done

            sha256sum "$tmp" | awk '{print $1}'
            rm -f "$tmp"
          }

          mapfile -t package_files < <(git ls-files 'package/**')
          mapfile -t overlay_files < <(
            git ls-files -- \
              'files/root/mgrserver/**' \
              'files/usr/share/mgrserver-defaults/pxe/**'
          )

          package_tree_hash="$(hash_file_list "${package_files[@]}")"
          package_selection_hash="$({
            grep -E '^(CONFIG_PACKAGE_|CONFIG_NODEJS_|CONFIG_ARIA2_|CONFIG_TARGET_ROOTFS_|CONFIG_TARGET_IMAGES_|CONFIG_SIGNED_PACKAGES|CONFIG_ALL_|CONFIG_IB|CONFIG_SDK|CONFIG_DEVEL)' \
              configs/jdc-ax1800pro.config \
              | sort \
              | sha256sum \
              | awk '{print $1}'
          })"
          toolchain_config_hash="$({
            grep -E '^(CONFIG_TARGET|CONFIG_TARGET_|CONFIG_TARGET_.*DEVICE_|CONFIG_ARCH|CONFIG_CPU_TYPE|CONFIG_CPU_SUBTYPE|CONFIG_USE_MUSL|CONFIG_USE_GLIBC|CONFIG_USE_UCLIBC|CONFIG_LIBC_|CONFIG_EXTERNAL_TOOLCHAIN|CONFIG_GCC_|CONFIG_BINUTILS_)' \
              configs/jdc-ax1800pro.config \
              | sort \
              | sha256sum \
              | awk '{print $1}'
          })"
          feeds_hash="$(hash_file_list feeds.conf.default scripts/diy-part1.sh)"
          dl_hash="$(hash_file_list feeds.conf.default scripts/diy-part1.sh scripts/diy-part2.sh "${package_files[@]}")"
          ccache_scope_hash="$({
            printf '%s\n' "${toolchain_config_hash}" "${package_selection_hash}" \
              | sha256sum \
              | awk '{print $1}'
          })"
          toolchain_hash="$(hash_file_list feeds.conf.default scripts/diy-part1.sh)"
          mgrserver_overlay_hash="$(hash_file_list scripts/copy-mgrserver-runtime-overlay.sh "${overlay_files[@]}")"

          {
            echo "package_tree_hash=$package_tree_hash"
            echo "package_selection_hash=$package_selection_hash"
            echo "toolchain_config_hash=$toolchain_config_hash"
            echo "feeds_hash=$feeds_hash"
            echo "dl_hash=$dl_hash"
            echo "ccache_scope_hash=$ccache_scope_hash"
            echo "toolchain_hash=$toolchain_hash"
            echo "mgrserver_overlay_hash=$mgrserver_overlay_hash"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve MgrServer source ref
        id: mgrserver_ref
        shell: bash
        env:
          DEFAULT_REPO: ${{ github.event.inputs.mgrserver_repo || github.event.client_payload.mgrserver_repo || 'l1i1/MgrServer' }}
          DEFAULT_BRANCH: ${{ github.event.inputs.mgrserver_branch || github.event.client_payload.mgrserver_branch || 'main' }}
        run: |
          set -euo pipefail

          repo="${DEFAULT_REPO:-l1i1/MgrServer}"
          branch="${DEFAULT_BRANCH:-main}"

          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-openwrt-ccache-v2-${{ steps.cache_fingerprint.outputs.ccache_scope_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-v2-

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs u-boot-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo pip3 install --upgrade pip
          sudo pip3 install --upgrade setuptools wheel build pyproject-hooks
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

          echo "Configuring ccache..."
          ccache --max-size=15G
          ccache -z
          echo "CCACHE_DIR=\$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=/workdir/openwrt" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=1" >> $GITHUB_ENV

      - name: Clone source code
        id: openwrt_ref
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          echo "commit=$(git -C openwrt rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Restore reusable base handoff artifact
        if: needs.resolve_base_build.outputs.reuse_base == 'true'
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          ARTIFACT_ID: ${{ needs.resolve_base_build.outputs.handoff_artifact_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOWNLOAD_DIR: ${{ github.workspace }}/.artifact-handoff/download/base-build
          ARCHIVE_PATH: ${{ github.workspace }}/.artifact-handoff/download/base-build/base-build.zip
        run: |
          set -euo pipefail

          rm -rf "$DOWNLOAD_DIR"
          mkdir -p "$DOWNLOAD_DIR"

          if [ -z "$ARTIFACT_ID" ]; then
            echo "No reusable base handoff artifact id resolved; falling back to cache-only overlay build."
            exit 0
          fi

          download_url="https://api.github.com/repos/${GH_REPO}/actions/artifacts/${ARTIFACT_ID}/zip"
          if ! curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$download_url" \
            -o "$ARCHIVE_PATH"; then
            echo "WARNING: failed to download reusable base handoff artifact ${ARTIFACT_ID}; falling back to cache-only overlay build."
            exit 0
          fi

          if ! python3 - <<'PY'
          import os
          import zipfile

          archive_path = os.environ["ARCHIVE_PATH"]
          target_dir = os.environ["DOWNLOAD_DIR"]

          with zipfile.ZipFile(archive_path) as archive:
              archive.extractall(target_dir)
          PY
          then
            echo "WARNING: failed to extract reusable base handoff artifact ${ARTIFACT_ID}; falling back to cache-only overlay build."
            rm -rf "$DOWNLOAD_DIR"
            mkdir -p "$DOWNLOAD_DIR"
            exit 0
          fi

      - name: Download current-run base build handoff artifact
        if: needs.resolve_base_build.outputs.reuse_base != 'true'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ needs.build_base.outputs.handoff_artifact_name }}
          path: ${{ github.workspace }}/.artifact-handoff/download/base-build

      - name: Unpack base build handoff payload
        shell: bash
        env:
          DOWNLOAD_DIR: ${{ github.workspace }}/.artifact-handoff/download/base-build
          HANDOFF_ROOT: ${{ github.workspace }}/.artifact-handoff/base-build
        run: |
          set -euo pipefail

          payload_path="$DOWNLOAD_DIR/openwrt-base-build-handoff.tar"

          rm -rf "$HANDOFF_ROOT"
          mkdir -p "$HANDOFF_ROOT"

          if [ ! -f "$payload_path" ]; then
            echo "No base build handoff payload found; continuing with cache-only overlay build."
            exit 0
          fi

          if ! tar -C "$GITHUB_WORKSPACE/.artifact-handoff" -xf "$payload_path"; then
            echo "WARNING: failed to unpack base build handoff payload; continuing with cache-only overlay build."
            rm -rf "$HANDOFF_ROOT"
            mkdir -p "$HANDOFF_ROOT"
            exit 0
          fi

          echo "Unpacked base build handoff payload:"
          du -sh "$HANDOFF_ROOT" || true

      - name: Verify base handoff metadata
        shell: bash
        env:
          EXPECTED_BASE_BUILD_FINGERPRINT: ${{ needs.resolve_base_build.outputs.base_build_fingerprint }}
          EXPECTED_OPENWRT_COMMIT: ${{ needs.resolve_base_build.outputs.reuse_base == 'true' && needs.resolve_base_build.outputs.openwrt_commit || needs.build_base.outputs.openwrt_commit }}
          EXPECTED_FEED_REVISION_HASH: ${{ needs.resolve_base_build.outputs.reuse_base == 'true' && needs.resolve_base_build.outputs.feed_revision_hash || needs.build_base.outputs.feed_revision_hash }}
          METADATA_FILE: ${{ github.workspace }}/.artifact-handoff/base-build/metadata.json
        run: |
          set -euo pipefail

          if [ ! -f "$METADATA_FILE" ]; then
            echo "Base handoff metadata not found at $METADATA_FILE; continuing with cache-only overlay build."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import sys

          metadata_path = os.environ["METADATA_FILE"]
          expected = {
              "base_build_fingerprint": os.environ["EXPECTED_BASE_BUILD_FINGERPRINT"],
              "openwrt_commit": os.environ["EXPECTED_OPENWRT_COMMIT"],
              "feed_revision_hash": os.environ["EXPECTED_FEED_REVISION_HASH"],
          }

          with open(metadata_path, "r", encoding="utf-8") as fh:
              actual = json.load(fh)

          for key, expected_value in expected.items():
              actual_value = actual.get(key)
              if actual_value != expected_value:
                  print(f"Metadata mismatch for {key}: expected {expected_value}, got {actual_value}", file=sys.stderr)
                  sys.exit(1)

          print("Base handoff metadata verified:")
          print(json.dumps(actual, indent=2))
          PY

      - name: Show cache plan
        run: |
          echo "Build role: mgrserver-overlay"
          echo "Base build fingerprint: ${{ needs.resolve_base_build.outputs.base_build_fingerprint }}"
          echo "Reusing previous base artifact: ${{ needs.resolve_base_build.outputs.reuse_base }}"
          echo "Base build OpenWrt commit: ${{ needs.resolve_base_build.outputs.reuse_base == 'true' && needs.resolve_base_build.outputs.openwrt_commit || needs.build_base.outputs.openwrt_commit }}"
          echo "Cache fingerprints:"
          echo "  package_selection_hash=${{ steps.cache_fingerprint.outputs.package_selection_hash }}"
          echo "  package_tree_hash=${{ steps.cache_fingerprint.outputs.package_tree_hash }}"
          echo "  toolchain_config_hash=${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}"
          echo "  feeds_hash=${{ steps.cache_fingerprint.outputs.feeds_hash }}"
          echo "  dl_hash=${{ steps.cache_fingerprint.outputs.dl_hash }}"
          echo "  ccache_scope_hash=${{ steps.cache_fingerprint.outputs.ccache_scope_hash }}"
          echo "  toolchain_hash=${{ steps.cache_fingerprint.outputs.toolchain_hash }}"
          echo "OpenWrt source commit: ${{ steps.openwrt_ref.outputs.commit }}"
          echo "Cache keys:"
          echo "  ccache=${{ runner.os }}-openwrt-ccache-v2-${{ steps.cache_fingerprint.outputs.ccache_scope_hash }}"
          echo "  feeds=${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.feeds_hash }}"
          echo "  dl=${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.dl_hash }}"
          echo "  toolchain=${{ runner.os }}-openwrt-toolchain-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.toolchain_hash }}"

      - name: Restore feeds cache
        id: feeds_cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/feeds
          key: ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.feeds_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-feeds-

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        if: steps.feeds_cache.outputs.cache-hit != 'true'
        run: cd openwrt && ./scripts/feeds update -a

      - name: Compute resolved feed fingerprint
        id: resolved_feeds
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt

          tmp="$(mktemp)"
          while IFS= read -r feed; do
            if git -C "feeds/$feed" rev-parse HEAD >/dev/null 2>&1; then
              printf '%s %s\n' "$feed" "$(git -C "feeds/$feed" rev-parse HEAD)" >> "$tmp"
            fi
          done < <(find feeds -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          if [ ! -s "$tmp" ]; then
            echo "No feed revisions found after update." >&2
            rm -f "$tmp"
            exit 1
          fi

          feed_revision_hash="$(sha256sum "$tmp" | awk '{print $1}')"

          {
            echo "feed_revision_hash=$feed_revision_hash"
            echo "feed_revisions<<EOF"
            cat "$tmp"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          rm -f "$tmp"

      - name: Verify overlay feed fingerprint matches base build
        run: |
          if [ "${{ steps.resolved_feeds.outputs.feed_revision_hash }}" != "${{ needs.resolve_base_build.outputs.reuse_base == 'true' && needs.resolve_base_build.outputs.feed_revision_hash || needs.build_base.outputs.feed_revision_hash }}" ]; then
            echo "ERROR: overlay build resolved different feed revisions from base build" >&2
            echo "  base:    ${{ needs.resolve_base_build.outputs.reuse_base == 'true' && needs.resolve_base_build.outputs.feed_revision_hash || needs.build_base.outputs.feed_revision_hash }}" >&2
            echo "  overlay: ${{ steps.resolved_feeds.outputs.feed_revision_hash }}" >&2
            exit 1
          fi

      - name: Show target/package cache plan
        run: |
          echo "Resolved feed revisions:"
          printf '%s\n' "${{ steps.resolved_feeds.outputs.feed_revisions }}"
          echo "Resolved fingerprints:"
          echo "  feed_revision_hash=${{ steps.resolved_feeds.outputs.feed_revision_hash }}"
          echo "Target/package cache key:"
          echo "  target_package=${{ runner.os }}-openwrt-target-package-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.cache_fingerprint.outputs.package_tree_hash }}-${{ steps.resolved_feeds.outputs.feed_revision_hash }}"

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Extract prebuilt IPKs into files overlay
        run: bash "$GITHUB_WORKSPACE/scripts/extract-prebuilt-ipks.sh"

      - name: Load custom configuration
        run: |
          [ -e files ] && cp -r files openwrt/files
          if [ -d package ]; then
            mkdir -p openwrt/package
            cp -r package/. openwrt/package/
          fi
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Prepare build configuration
        run: |
          cd openwrt
          make defconfig

      - name: Restore source download cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.dl_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.openwrt_ref.outputs.commit }}-
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-
            ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-dl-

      - name: Apply base build dl artifact
        shell: bash
        run: |
          set -euo pipefail

          HANDOFF_DL="$GITHUB_WORKSPACE/.artifact-handoff/base-build/dl"
          OPENWRT_DL="$GITHUB_WORKSPACE/openwrt/dl"

          if [ ! -d "$HANDOFF_DL" ]; then
            echo "No base build dl artifact found."
            exit 0
          fi

          mkdir -p "$OPENWRT_DL"
          rsync -a "$HANDOFF_DL/" "$OPENWRT_DL/"

          echo "Applied base build dl artifact:"
          du -sh "$HANDOFF_DL" || true

      - name: Restore toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/host
            openwrt/staging_dir/hostpkg
            openwrt/staging_dir/toolchain-*
            openwrt/build_dir/host
            openwrt/build_dir/hostpkg
            openwrt/build_dir/toolchain-*
          key: ${{ runner.os }}-openwrt-toolchain-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.toolchain_hash }}

      - name: Restore target/package cache
        id: target_package_cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/openwrt-target-package
          key: ${{ runner.os }}-openwrt-target-package-${{ steps.openwrt_ref.outputs.commit }}-${{ steps.cache_fingerprint.outputs.toolchain_config_hash }}-${{ steps.cache_fingerprint.outputs.package_selection_hash }}-${{ steps.cache_fingerprint.outputs.package_tree_hash }}-${{ steps.resolved_feeds.outputs.feed_revision_hash }}

      - name: Apply base build target/package artifact
        shell: bash
        run: |
          set -euo pipefail

          HANDOFF_TARGET="$GITHUB_WORKSPACE/.artifact-handoff/base-build/target-package"
          CACHE_ROOT="$GITHUB_WORKSPACE/.cache/openwrt-target-package"

          if [ ! -d "$HANDOFF_TARGET" ]; then
            echo "No base build target/package artifact found."
            exit 0
          fi

          rm -rf "$CACHE_ROOT"
          mkdir -p "$CACHE_ROOT"
          rsync -a --delete "$HANDOFF_TARGET/" "$CACHE_ROOT/"

          echo "Applied base build target/package artifact:"
          du -sh "$HANDOFF_TARGET" || true

      - name: Hydrate target/package cache
        shell: bash
        run: |
          set -euo pipefail

          CACHE_ROOT="$GITHUB_WORKSPACE/.cache/openwrt-target-package"
          OPENWRT_ROOT="$GITHUB_WORKSPACE/openwrt"

          if [ ! -d "$CACHE_ROOT" ]; then
            echo "No target/package cache staging directory restored."
            exit 0
          fi

          echo "Hydrating curated target/package cache into build tree..."

          if [ -d "$CACHE_ROOT/bin/packages" ]; then
            mkdir -p "$OPENWRT_ROOT/bin/packages"
            rsync -a "$CACHE_ROOT/bin/packages/" "$OPENWRT_ROOT/bin/packages/"
          fi

          if [ -d "$CACHE_ROOT/staging_dir" ]; then
            mkdir -p "$OPENWRT_ROOT/staging_dir"
            rsync -a "$CACHE_ROOT/staging_dir/" "$OPENWRT_ROOT/staging_dir/"
          fi

          if [ -d "$CACHE_ROOT/build_dir" ]; then
            mkdir -p "$OPENWRT_ROOT/build_dir"
            rsync -a "$CACHE_ROOT/build_dir/" "$OPENWRT_ROOT/build_dir/"
          fi

          echo "Hydrated target/package cache contents:"
          du -sh "$CACHE_ROOT" || true

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download package
        id: package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Validate package selection before compile
        run: |
          cd openwrt

          require_config() {
            local pattern="$1"
            if grep -qx "$pattern" .config; then
              echo "✓ $pattern"
            else
              echo "✗ Missing required config: $pattern"
              exit 1
            fi
          }

          require_config "CONFIG_NODEJS_22=y"
          require_config "CONFIG_PACKAGE_node=y"
          require_config "CONFIG_PACKAGE_node-npm=y"
          require_config "CONFIG_PACKAGE_python3=y"
          require_config "CONFIG_PACKAGE_kmod-tun=y"
          require_config "CONFIG_PACKAGE_kmod-inet-diag=y"
          require_config "CONFIG_PACKAGE_kmod-nft-queue=y"
          require_config "CONFIG_PACKAGE_luci-compat=y"
          require_config "CONFIG_PACKAGE_aria2=y"
          require_config "CONFIG_ARIA2_OPENSSL=y"
          require_config "CONFIG_PACKAGE_parted=y"
          require_config "CONFIG_PACKAGE_hostapd-utils=y"
          require_config "CONFIG_PACKAGE_miniupnpd-nftables=y"

      - name: Warm tools and toolchain cache
        run: |
          cd openwrt
          echo "Reusing host tools and toolchain from base build cache..."
          make tools/install -j"$(nproc)" || make tools/install -j1 V=s
          make toolchain/install -j"$(nproc)" || make toolchain/install -j1 V=s

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo "ccache stats before compile:"
          ccache -s || true
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "ccache stats after compile:"
          ccache -s || true
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          echo "Files to be released:"
          ls -la

      - name: Verify firmware files
        id: verify
        if: steps.organize.outputs.status == 'success' && !cancelled()
        run: bash "$GITHUB_WORKSPACE/scripts/verify-firmware-artifacts.sh" "${{ env.FIRMWARE }}"

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.verify.outcome == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.verify.outcome == 'success' && !cancelled()
        run: |
          MGRSERVER_COMMIT_SHORT="$(printf '%s' "${{ steps.mgrserver_ref.outputs.commit }}" | cut -c1-12)"
          OPENWRT_COMMIT_SHORT="$(printf '%s' "${{ steps.openwrt_ref.outputs.commit }}" | cut -c1-12)"
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          echo "## 京东云亚瑟 AX1800 Pro OpenWrt 固件 (含 MgrServer)" >> release.txt
          echo "" >> release.txt
          echo "### 固件信息" >> release.txt
          echo "- 源码: ${REPO_DISPLAY_NAME} (${REPO_BRANCH})" >> release.txt
          echo "- OpenWrt Commit: ${OPENWRT_COMMIT_SHORT}" >> release.txt
          echo "- 设备: JDCloud RE-SS-01 (AX1800 Pro)" >> release.txt
          echo "- 编译时间: $(date +"%Y-%m-%d %H:%M")" >> release.txt
          echo "" >> release.txt
          echo "### MgrServer 叠加层" >> release.txt
          echo "- 仓库: ${{ steps.mgrserver_ref.outputs.repo }}" >> release.txt
          echo "- 分支: ${{ steps.mgrserver_ref.outputs.branch }}" >> release.txt
          echo "- Commit: ${MGRSERVER_COMMIT_SHORT}" >> release.txt
          echo "" >> release.txt
          echo "### 已包含" >> release.txt
          echo "- MgrServer (路由器管理后台, 端口 80)" >> release.txt
          echo "- Node.js 22.x + npm" >> release.txt
          echo "- Python3 (25 子包)" >> release.txt
          echo "- aria2（跟随当前源码树编译，用于 PXE 资源下载）" >> release.txt
          echo "- sing-box (预编译 IPK，已校验 kmod-tun / kmod-inet-diag / kmod-nft-queue)" >> release.txt
          echo "- easytier v2.5.0 + luci-app-easytier (预编译 IPK，已校验 kmod-tun / luci-compat)" >> release.txt
          if [ "${HAS_QCA_NSS_DP:-false}" = "true" ]; then
            echo "- qca-nss-dp 数据通路加速" >> release.txt
          fi
          echo "- hostapd-utils（WPS PBC 所需 hostapd_cli）" >> release.txt
          echo "- miniupnpd（UPnP 管理）" >> release.txt
          echo "- PXE 默认资源（首启同步到 /home/pxe）" >> release.txt
          echo "- /home 分区自动挂载" >> release.txt
          echo "" >> release.txt
          echo "### 默认设置" >> release.txt
          echo "- MgrServer: http://192.168.1.1 (密码: password)" >> release.txt
          echo "- LuCI: http://192.168.1.1:3500" >> release.txt
          echo "- 用户名: root" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 10

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        if: env.UPLOAD_RELEASE == 'true' && steps.verify.outcome == 'success' && !cancelled()
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
